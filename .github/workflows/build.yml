name: Build Mlejit Office (APK + AAB)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Decode keystore (for signed release)
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/mlejit.jks"

      - name: Build signed release AAB
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/mlejit.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MlejitOffice-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release AAB
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MlejitOffice-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
